<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trident | Professional Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FIREBASE & AUTH ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // YOUR VERIFIED CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDcry0cEa5eqXiE_QgX2satkrt1mKsnFXQ",
            authDomain: "trident-56ae7.firebaseapp.com",
            projectId: "trident-56ae7",
            storageBucket: "trident-56ae7.firebasestorage.app",
            messagingSenderId: "788219973143",
            appId: "1:788219973143:web:299bfa34e72fa991c69652",
            measurementId: "G-NQMJBHWW9X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Global Login Function
        window.tridentLogin = () => {
            signInWithPopup(auth, provider).catch(err => console.error("Auth Error:", err));
        };

        // Global Logout Function
        window.tridentLogout = () => {
            signOut(auth).then(() => location.reload());
        };

        // Auth Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                state.username = user.displayName.split(' ')[0].toUpperCase();
                state.photoURL = user.photoURL;
                initializeTridentInterface();
            }
        });
    </script>

    <style>
        body { background-color: #030303; color: #e5e5e5; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); }
        .trident-gradient { background: linear-gradient(135deg, #007ACC 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        @keyframes pulse-cyan { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
        .recording { animation: pulse-cyan 1.5s infinite; background-color: #dc2626 !important; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- AUTH OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#030303]">
        <div class="w-full max-w-sm p-12 glass rounded-[3rem] shadow-2xl text-center border border-white/5">
            <div class="mb-6 flex justify-center">
                <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center border border-blue-500/20">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
            </div>
            <h1 class="text-5xl font-black trident-gradient tracking-tighter mb-2 italic">TRIDENT</h1>
            <p class="text-[10px] text-gray-600 font-bold tracking-[0.5em] mb-12 uppercase">Private Communication Array</p>
            
            <button onclick="window.tridentLogin()" class="group w-full bg-white text-black font-black py-4 rounded-2xl transition-all flex items-center justify-center space-x-3 hover:bg-gray-200 active:scale-95 shadow-xl">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6" alt="">
                <span class="text-xs tracking-widest uppercase">Operator Sign-In</span>
            </button>
            
            <p class="mt-10 text-[8px] text-gray-800 font-bold uppercase tracking-[0.2em]">Verified Firebase Security v12.11</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="flex flex-1 h-full hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-80 glass flex flex-col border-r border-white/5 bg-[#050505]">
            <div class="p-8">
                <!-- User Profile -->
                <div class="flex items-center space-x-4 mb-10 p-4 bg-white/5 rounded-2xl border border-white/5">
                    <img id="user-avatar" class="w-10 h-10 rounded-full border border-blue-500/30" src="" alt="">
                    <div class="flex flex-col truncate">
                        <span id="user-display-name" class="text-xs font-black text-white truncate uppercase">OPERATOR</span>
                        <button onclick="window.tridentLogout()" class="text-[8px] text-gray-500 hover:text-red-500 font-bold uppercase tracking-widest text-left">Disconnect</button>
                    </div>
                </div>

                <h2 class="text-gray-600 text-[9px] font-black uppercase tracking-[0.3em] mb-6 ml-2">Active Channels</h2>
                <div id="group-list" class="space-y-2 overflow-y-auto max-h-[50vh]"></div>
            </div>
            
            <div class="mt-auto p-8 border-t border-white/5 bg-black/40">
                <button id="btn-create-group" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl transition-all text-[10px] uppercase tracking-widest shadow-lg shadow-blue-900/20 hover:bg-blue-500">INIT NEW FREQUENCY</button>
            </div>
        </aside>

        <!-- CHAT AREA -->
        <main class="flex-1 flex flex-col bg-[#020202]">
            <header class="p-6 border-b border-white/5 flex justify-between items-center glass">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">Secured Link</span>
                    <h3 id="current-room-name" class="text-xl font-light text-gray-300 tracking-tighter uppercase italic">Array Standby</h3>
                </div>
                <div id="status-text" class="text-[9px] font-black text-gray-700 tracking-widest uppercase px-4 py-2 border border-white/5 rounded-full">Node: Idle</div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-6 text-sm"></div>

            <footer class="p-10 border-t border-white/5 glass">
                <div class="max-w-5xl mx-auto flex items-end space-x-4">
                    <div class="flex-1 flex flex-col space-y-2">
                        <input type="text" id="chat-input" class="w-full bg-black border border-[#1a1a1a] rounded-2xl p-5 outline-none focus:border-blue-500/30 transition-all text-white placeholder-gray-800" placeholder="Enter broadcast packet...">
                    </div>
                    <button id="btn-mic" class="w-16 h-16 bg-[#0a0a0a] border border-white/5 rounded-2xl flex items-center justify-center hover:bg-[#111] transition-all text-2xl shadow-lg">🎤</button>
                    <button id="btn-send" class="px-10 h-16 bg-blue-600 hover:bg-blue-500 rounded-2xl text-white font-black transition-all text-xs uppercase tracking-widest shadow-xl">Transmit</button>
                </div>
            </footer>
        </main>
    </div>

    <script>
        const LOBBY_TOPIC = "TRIDENT_CORE_LOBBY_V5";
        let state = {
            username: "",
            photoURL: "",
            sessionId: Math.random().toString(36).substring(2, 10),
            currentRoom: null,
            processedIds: new Set(),
            activeGroups: {},
            mediaRecorder: null,
            audioChunks: [],
            sse: null
        };

        const ui = {
            overlay: document.getElementById('login-overlay'),
            main: document.getElementById('main-app'),
            avatar: document.getElementById('user-avatar'),
            displayName: document.getElementById('user-display-name'),
            groupList: document.getElementById('group-list'),
            chatBox: document.getElementById('chat-box'),
            chatInput: document.getElementById('chat-input'),
            btnSend: document.getElementById('btn-send'),
            btnMic: document.getElementById('btn-mic'),
            roomTitle: document.getElementById('current-room-name'),
            status: document.getElementById('status-text'),
            btnCreate: document.getElementById('btn-create-group')
        };

        function initializeTridentInterface() {
            ui.overlay.style.display = 'none';
            ui.main.classList.remove('hidden');
            ui.avatar.src = state.photoURL;
            ui.displayName.innerText = state.username;
            startLobbyDiscovery();
        }

        async function broadcast(topic, text, blob = null) {
            if (!topic) return;
            const meta = `${state.sessionId}<|>${state.username}<|>${text}`;
            try {
                if (blob) {
                    await fetch(`https://ntfy.sh/${topic}`, { method: 'POST', body: blob, headers: { 'X-Message': meta, 'X-Title': 'TRIDENT_VOICE' } });
                } else {
                    await fetch(`https://ntfy.sh/${topic}`, { method: 'POST', body: meta });
                }
            } catch (e) {}
        }

        function establishPipeline(topic) {
            if (state.sse) state.sse.close();
            state.currentRoom = topic;
            ui.roomTitle.innerText = topic;
            ui.chatBox.innerHTML = `<div class="text-[10px] text-blue-900 font-bold uppercase tracking-[0.4em] mb-12 text-center">Synchronizing with Array Frequency...</div>`;
            state.processedIds.clear();
            
            state.sse = new EventSource(`https://ntfy.sh/${topic}/sse`);
            state.sse.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (state.processedIds.has(data.id)) return;
                state.processedIds.add(data.id);
                const p = data.message.split('<|>');
                if (p.length === 3) {
                    renderUIMsg(p[0] === state.sessionId ? "YOU" : p[1], p[2], data.attachment);
                }
            };
            broadcast(topic, "SYSTEM: NODE CONNECTED");
            ui.status.innerText = "Node: Active Stream";
        }

        function startLobbyDiscovery() {
            const sse = new EventSource(`https://ntfy.sh/${LOBBY_TOPIC}/sse`);
            sse.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const p = data.message.split('|');
                if (p[0] === "HB") {
                    state.activeGroups[p[1]] = { room: p[1], user: p[2], time: Date.now() };
                    renderSidebar();
                }
            };
            setInterval(() => {
                if (state.currentRoom) broadcast(LOBBY_TOPIC, `HB|${state.currentRoom}|${state.username}`);
                renderSidebar();
            }, 8000);
        }

        function renderUIMsg(user, text, attach) {
            const div = document.createElement('div');
            const isSelf = user === "YOU";
            div.className = `flex flex-col space-y-1 ${isSelf ? 'border-r-2 border-blue-600 pr-5 text-right' : 'border-l border-white/5 pl-5'}`;
            div.innerHTML = `<span class="text-[9px] font-black uppercase tracking-[0.2em] ${isSelf ? 'text-blue-500' : 'text-gray-600'}">${user}</span><span class="text-gray-300 font-light tracking-tight">${text}</span>`;
            ui.chatBox.appendChild(div);
            ui.chatBox.scrollTop = ui.chatBox.scrollHeight;
            if (attach && !isSelf) new Audio(attach.url).play();
        }

        function renderSidebar() {
            ui.groupList.innerHTML = '';
            Object.values(state.activeGroups).forEach(g => {
                if (Date.now() - g.time > 25000) return;
                const b = document.createElement('button');
                b.className = "w-full text-left p-5 bg-white/5 rounded-2xl border border-white/5 hover:border-blue-500/30 transition-all group";
                b.innerHTML = `<div class="text-white font-black text-xs uppercase group-hover:text-blue-400 transition-colors">${g.user}</div><div class="text-[8px] text-gray-700 font-bold uppercase tracking-widest mt-1 italic">${g.room}</div>`;
                b.onclick = () => establishPipeline(g.room);
                ui.groupList.appendChild(b);
            });
        }

        ui.btnCreate.onclick = () => {
            const rid = "T_" + Math.random().toString(36).substring(2, 8).toUpperCase();
            establishPipeline(rid);
            ui.btnCreate.innerText = "FREQUENCY ACTIVE";
            ui.btnCreate.classList.add('opacity-30');
            ui.btnCreate.disabled = true;
        };

        ui.btnSend.onclick = () => {
            if (!ui.chatInput.value || !state.currentRoom) return;
            broadcast(state.currentRoom, ui.chatInput.value);
            ui.chatInput.value = '';
        };

        ui.btnMic.onclick = async () => {
            try {
                if (!state.mediaRecorder) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    state.mediaRecorder = new MediaRecorder(stream);
                    state.mediaRecorder.ondataavailable = e => state.audioChunks.push(e.data);
                    state.mediaRecorder.onstop = () => {
                        const blob = new Blob(state.audioChunks, { type: 'audio/wav' });
                        broadcast(state.currentRoom, "🎤 (VOICE PACKET TRANSMITTED)", blob);
                        state.audioChunks = [];
                    };
                }
                if (state.mediaRecorder.state === "inactive") {
                    state.mediaRecorder.start();
                    ui.btnMic.classList.add('recording');
                } else {
                    state.mediaRecorder.stop();
                    ui.btnMic.classList.remove('recording');
                }
            } catch (err) { alert("Microphone array not detected."); }
        };

        window.onkeydown = (e) => { if(e.key === 'Enter') ui.btnSend.click(); };
    </script>
</body>
</html>
