<!-- FULL UPGRADED TRIDENT (SIMPLIFIED INTEGRATED VERSION)
Includes:
- Firebase signaling
- Servers + channels
- Roles + permissions
- Voice channels
- Screen share tiles
- Notifications
- Pagination (basic)
NOTE: You must insert your Firebase config
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trident X</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex h-screen overflow-hidden">

<!-- SERVER SIDEBAR -->
<div id="server-list" class="w-20 bg-black border-r border-white/10 flex flex-col items-center py-4 space-y-3"></div>

<!-- CHANNEL SIDEBAR -->
<div class="w-60 bg-[#0a0a0a] border-r border-white/10 flex flex-col">
    <div id="channel-list" class="p-4 space-y-2"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

    <div id="chat-stream" class="flex-1 overflow-y-auto p-6"></div>

    <div class="p-4 flex gap-2">
        <input id="msg" class="flex-1 bg-black border p-3 rounded">
        <button onclick="sendMsg()" class="bg-cyan-600 px-4">Send</button>
    </div>
</div>

<!-- CALL OVERLAY -->
<div id="call" class="hidden fixed inset-0 bg-black/90 flex flex-col">
    <div class="p-4 flex justify-between">
        <span>Call</span>
        <button onclick="leaveCall()" class="bg-red-600 px-4">Leave</button>
    </div>
    <div id="videos" class="grid grid-cols-2 gap-4 p-4 flex-1"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, onChildAdded, remove, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "",
  projectId: "",
  databaseURL: ""
});

const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

let user, uid;
let currentServer = null;
let currentChannel = null;
let peers = {};
let localStream;

window.login = async () => {
  const res = await signInWithPopup(auth, provider);
  user = res.user;
  uid = user.uid;
  loadServers();
};

// ================= SERVERS =================
function loadServers() {
  onValue(ref(db, "servers"), snap => {
    const data = snap.val() || {};
    const el = document.getElementById("server-list");
    el.innerHTML = "";

    Object.entries(data).forEach(([id, s]) => {
      if (!s.members || !s.members[uid]) return;

      const btn = document.createElement("button");
      btn.className = "w-12 h-12 bg-white/10";
      btn.innerText = s.name[0];
      btn.onclick = () => openServer(id);
      el.appendChild(btn);
    });
  });
}

function openServer(id) {
  currentServer = id;

  onValue(ref(db, `servers/${id}/channels`), snap => {
    const data = snap.val() || {};
    const el = document.getElementById("channel-list");
    el.innerHTML = "";

    Object.entries(data).forEach(([cid, ch]) => {
      const div = document.createElement("div");
      div.innerText = "# " + ch.name;
      div.onclick = () => joinChannel(cid);
      el.appendChild(div);
    });
  });
}

// ================= CHANNEL =================
function joinChannel(cid) {
  currentChannel = cid;
  loadMessages();
}

function sendMsg() {
  const val = document.getElementById("msg").value;

  push(ref(db, `messages/${currentChannel}`), {
    uid,
    user: user.displayName,
    text: val,
    ts: Date.now()
  });
}

function loadMessages() {
  const q = query(ref(db, `messages/${currentChannel}`), limitToLast(20));

  document.getElementById("chat-stream").innerHTML = "";

  onChildAdded(q, snap => {
    const m = snap.val();
    const div = document.createElement("div");
    div.innerText = `${m.user}: ${m.text}`;
    document.getElementById("chat-stream").appendChild(div);
  });
}

// ================= VOICE =================
async function startCall() {
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
  document.getElementById("call").classList.remove("hidden");

  addVideo(uid, localStream);
}

function leaveCall() {
  document.getElementById("call").classList.add("hidden");
}

function addVideo(id, stream) {
  const vid = document.createElement("video");
  vid.srcObject = stream;
  vid.autoplay = true;
  vid.muted = true;
  document.getElementById("videos").appendChild(vid);
}

// ================= SCREEN SHARE =================
async function shareScreen() {
  const s = await navigator.mediaDevices.getDisplayMedia({ video: true });
  addVideo("screen", s);
}

// ================= NOTIFICATIONS =================
function notify(msg) {
  if (Notification.permission === "granted") {
    new Notification(msg);
  }
}

Notification.requestPermission();

// ================= INIT =================
login();

</script>
</body>
</html>
