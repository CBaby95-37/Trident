<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trident</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const CONFIG = {
            apiKey: "AIzaSyDcry0cEa5eqXiE_QgX2satkrt1mKsnFXQ",
            authDomain: "trident-56ae7.firebaseapp.com",
            projectId: "trident-56ae7",
            storageBucket: "trident-56ae7.firebasestorage.app",
            messagingSenderId: "788219973143",
            appId: "1:788219973143:web:299bfa34e72fa991c69652",
            measurementId: "G-NQMJBHWW9X"
        };

        class TridentApp {
            constructor() {
                this.app = initializeApp(CONFIG);
                this.auth = getAuth(this.app);
                this.db = getFirestore(this.app);
                this.provider = new GoogleAuthProvider();
                this.state = {
                    user: null, // Custom profile from Firestore
                    rawUser: null, // Auth object
                    sessionID: Math.random().toString(36).substring(2, 15),
                    currentRoom: null,
                    lobbySSE: null,
                    roomSSE: null,
                    activeGroups: new Map(),
                    processedPackets: new Set(),
                    recorder: null,
                    chunks: [],
                    pfpBase64: ""
                };
                this.initAuth();
            }

            initAuth() {
                onAuthStateChanged(this.auth, async (user) => {
                    if (user) {
                        this.state.rawUser = user;
                        const userDoc = await getDoc(doc(this.db, "users", user.uid));
                        if (userDoc.exists()) {
                            this.state.user = userDoc.data();
                            this.launchUI();
                        } else {
                            this.showProfileSetup(true);
                        }
                    } else {
                        document.getElementById('login-gate').style.display = 'flex';
                    }
                });
            }

            showProfileSetup(isFirstTime) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('profile-gate').style.display = 'flex';
                if (!isFirstTime) {
                    document.getElementById('setup-username').value = this.state.user.username;
                    this.state.pfpBase64 = this.state.user.pfp;
                    document.getElementById('setup-preview').src = this.state.user.pfp;
                }
            }

            async saveProfile() {
                const username = document.getElementById('setup-username').value.trim();
                if (!username || !this.state.pfpBase64) return alert("Username and Image required.");

                const profile = {
                    username: username.toUpperCase(),
                    pfp: this.state.pfpBase64,
                    uid: this.state.rawUser.uid
                };

                await setDoc(doc(this.db, "users", this.state.rawUser.uid), profile);
                this.state.user = profile;
                document.getElementById('profile-gate').style.display = 'none';
                this.launchUI();
            }

            async send(text, blob = null) {
                if (!this.state.currentRoom) return;
                const meta = `${this.state.sessionID}<|>${this.state.user.username}<|>${text}<|>${this.state.user.pfp}`;
                const options = blob ? {
                    method: 'POST', body: blob,
                    headers: { 'X-Message': meta, 'X-Title': 'TRIDENT_VOICE' }
                } : { method: 'POST', body: meta };
                await fetch(`https://ntfy.sh/${this.state.currentRoom}`, options);
            }

            join(roomID) {
                if (this.state.roomSSE) this.state.roomSSE.close();
                this.state.currentRoom = roomID;
                this.state.processedPackets.clear();
                document.getElementById('chat-stream').innerHTML = `<div class="text-[9px] text-cyan-800 font-bold uppercase tracking-widest mb-6 text-center">Synced: ${roomID}</div>`;
                
                this.state.roomSSE = new EventSource(`https://ntfy.sh/${roomID}/sse`);
                this.state.roomSSE.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (this.state.processedPackets.has(data.id)) return;
                    this.state.processedPackets.add(data.id);
                    const parts = data.message.split('<|>');
                    if (parts.length >= 3) {
                        this.renderMessage(parts[0], parts[1], parts[2], parts[3], data.attachment);
                    }
                };
                document.getElementById('header-title').innerText = roomID;
                this.send("connected.");
            }

            initLobby() {
                if (this.state.lobbySSE) this.state.lobbySSE.close();
                this.state.lobbySSE = new EventSource(`https://ntfy.sh/TRIDENT_LOBBY_V5/sse`);
                this.state.lobbySSE.onmessage = (e) => {
                    const p = JSON.parse(e.data);
                    const parts = p.message.split('|');
                    if (parts[0] === "HB") {
                        this.state.activeGroups.set(parts[1], { id: parts[1], user: parts[2], ts: Date.now() });
                        this.renderSidebar();
                    }
                };
                setInterval(() => {
                    if (this.state.currentRoom) {
                        fetch(`https://ntfy.sh/TRIDENT_LOBBY_V5`, {
                            method: 'POST', body: `HB|${this.state.currentRoom}|${this.state.user.username}`
                        });
                    }
                    this.cleanupGroups();
                }, 10000);
            }

            renderMessage(sid, user, msg, pfp, attach) {
                const isSelf = sid === this.state.sessionID;
                const box = document.getElementById('chat-stream');
                const div = document.createElement('div');
                div.className = `flex mb-5 animate__animated animate__fadeInUp animate__faster ${isSelf ? 'justify-end' : 'justify-start'}`;
                
                const content = `
                    <div class="flex ${isSelf ? 'flex-row-reverse' : 'flex-row'} items-start space-x-3">
                        <img src="${pfp || ''}" class="w-8 h-8 rounded-full border border-white/10 ${isSelf ? 'ml-3' : 'mr-3'}">
                        <div class="flex flex-col ${isSelf ? 'items-end' : 'items-start'}">
                            <span class="text-[9px] font-bold mb-1 ${isSelf ? 'text-cyan-500' : 'text-gray-600'} uppercase">${isSelf ? 'YOU' : user}</span>
                            <div class="max-w-md p-3 rounded-xl text-sm ${isSelf ? 'bg-cyan-600/10 border border-cyan-500/20 text-white' : 'bg-white/5 border border-white/5 text-gray-300'}">
                                ${msg}
                                ${attach ? `<div class="mt-2 text-cyan-400 text-[8px] font-bold">● Audio</div>` : ''}
                            </div>
                        </div>
                    </div>`;
                div.innerHTML = content;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
                if (attach && !isSelf) new Audio(attach.url).play();
            }

            renderSidebar() {
                const list = document.getElementById('group-list');
                list.innerHTML = '';
                this.state.activeGroups.forEach(g => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 mb-2 rounded-xl bg-white/5 border border-white/5 hover:border-cyan-500/40 transition-all";
                    btn.innerHTML = `<div class="text-xs font-bold text-white">${g.user}'s Group</div><div class="text-[9px] text-gray-600 font-mono uppercase">${g.id}</div>`;
                    btn.onclick = () => this.join(g.id);
                    list.appendChild(btn);
                });
            }

            cleanupGroups() {
                const now = Date.now();
                this.state.activeGroups.forEach((v, k) => { if (now - v.ts > 30000) this.state.activeGroups.delete(k); });
                this.renderSidebar();
            }

            launchUI() {
                document.getElementById('app-main').style.display = 'flex';
                document.getElementById('u-name').innerText = this.state.user.username;
                document.getElementById('u-img').src = this.state.user.pfp;
                this.initLobby();
            }
        }

        window.App = new TridentApp();
        window.doLogin = () => window.App.login();
        window.saveProfile = () => window.App.saveProfile();
        window.editProfile = () => window.App.showProfileSetup(false);
        window.createRoom = () => window.App.join("TRIDENT_" + Math.random().toString(36).substring(2, 8).toUpperCase());
        window.sendMsg = () => {
            const i = document.getElementById('msg-in');
            if (!i.value) return;
            window.App.send(i.value);
            i.value = '';
        };
        window.handleFile = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                window.App.state.pfpBase64 = reader.result;
                document.getElementById('setup-preview').src = reader.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        window.toggleMic = async () => {
            const b = document.getElementById('mic-btn');
            if (!window.App.state.recorder) {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                window.App.state.recorder = new MediaRecorder(s);
                window.App.state.recorder.ondataavailable = e => window.App.state.chunks.push(e.data);
                window.App.state.recorder.onstop = () => {
                    const blob = new Blob(window.App.state.chunks, { type: 'audio/wav' });
                    window.App.send("🎤 Voice Note", blob);
                    window.App.state.chunks = [];
                };
            }
            if (window.App.state.recorder.state === "inactive") {
                window.App.state.recorder.start();
                b.classList.add('rec-active');
            } else {
                window.App.state.recorder.stop();
                b.classList.remove('rec-active');
            }
        };
        document.addEventListener('keydown', (e) => { if(e.key === 'Enter') window.sendMsg(); });
    </script>

    <style>
        body { background-color: #030303; color: #fff; letter-spacing: -0.01em; }
        .glass { background: rgba(8, 8, 8, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.02); }
        .stream-box::-webkit-scrollbar { width: 2px; }
        .stream-box::-webkit-scrollbar-thumb { background: #222; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.3); } 70% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .rec-active { animation: pulse-red 1s infinite; background-color: #dc2626 !important; }
        .logo-glow { filter: drop-shadow(0 0 8px rgba(0, 122, 204, 0.4)); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- LOGIN -->
    <div id="login-gate" class="fixed inset-0 z-[100] hidden items-center justify-center bg-[#030303]">
        <div class="w-full max-w-xs p-12 glass rounded-[3rem] text-center">
            <h1 class="text-5xl font-black italic tracking-tighter mb-2">TRIDENT</h1>
            <p class="text-[9px] text-gray-700 font-bold uppercase tracking-[0.4em] mb-12">Alpha 26.3.28b</p>
            <button onclick="doLogin()" class="w-full bg-white text-black font-black py-4 rounded-xl transition-all hover:bg-gray-100 text-[10px] uppercase tracking-widest">
                Login with Google
            </button>
        </div>
    </div>

    <!-- PROFILE SETUP -->
    <div id="profile-gate" class="fixed inset-0 z-[110] hidden items-center justify-center bg-[#030303]">
        <div class="w-full max-w-sm p-10 glass rounded-[2rem] border border-white/5">
            <h2 class="text-xl font-bold mb-6 text-center">Setup Profile</h2>
            <div class="flex flex-col items-center mb-6">
                <img id="setup-preview" class="w-24 h-24 rounded-full border-2 border-cyan-500 mb-4 object-cover bg-black" src="">
                <input type="file" id="file-in" onchange="handleFile(event)" class="hidden">
                <button onclick="document.getElementById('file-in').click()" class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest">Upload Image</button>
            </div>
            <input type="text" id="setup-username" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-6 outline-none focus:border-cyan-500 transition-all text-sm" placeholder="Choose Username">
            <button onclick="saveProfile()" class="w-full bg-cyan-600 text-white font-black py-4 rounded-xl uppercase text-xs tracking-widest">Save and Enter</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-main" class="flex flex-1 h-full hidden">
        <aside class="w-72 glass border-r border-white/5 flex flex-col">
            <div class="p-6">
                <button onclick="editProfile()" class="flex items-center space-x-3 mb-10 p-3 bg-white/[0.02] border border-white/5 rounded-xl w-full hover:bg-white/[0.05] transition-all">
                    <img id="u-img" class="w-8 h-8 rounded-full border border-cyan-500/20 object-cover" src="" alt="">
                    <span id="u-name" class="text-[10px] font-black truncate uppercase tracking-tight">---</span>
                </button>
                <h2 class="text-[9px] font-black text-gray-700 uppercase tracking-widest mb-4 ml-2">Groups</h2>
                <div id="group-list" class="space-y-1 overflow-y-auto max-h-[60vh] stream-box"></div>
            </div>
            <div class="mt-auto p-6 text-center">
                <button onclick="createRoom()" class="w-full py-4 bg-cyan-600/10 border border-cyan-500/20 text-cyan-500 font-black text-[10px] uppercase tracking-widest rounded-xl hover:bg-cyan-600 hover:text-white transition-all">
                    Create Group
                </button>
                <div class="mt-6 text-[8px] text-gray-800 font-bold uppercase tracking-widest">Alpha 26.3.28b</div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#010101]">
            <header class="p-6 border-b border-white/5 flex justify-between items-center bg-black/40">
                <h3 id="header-title" class="text-xl font-light tracking-tighter text-gray-400 uppercase italic">Idle</h3>
                <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_6px_#22c55e]"></div>
            </header>
            <div id="chat-stream" class="flex-1 overflow-y-auto p-8 stream-box"></div>
            <footer class="p-6 border-t border-white/5 glass">
                <div class="max-w-4xl mx-auto flex items-center space-x-3">
                    <input type="text" id="msg-in" class="flex-1 bg-black/40 border border-white/5 rounded-xl p-4 outline-none focus:border-cyan-500/20 transition-all text-sm" placeholder="Type here...">
                    <button id="mic-btn" onclick="toggleMic()" class="w-12 h-12 bg-white/[0.02] border border-white/5 rounded-xl flex items-center justify-center hover:bg-white/[0.04] transition-all text-lg shadow-inner">🎤</button>
                    <button onclick="sendMsg()" class="px-8 h-12 bg-cyan-600 text-white font-black text-[10px] uppercase tracking-widest rounded-xl transition-all hover:bg-cyan-500">Send</button>
                </div>
            </footer>
        </main>
    </div>
</body>
</html>
