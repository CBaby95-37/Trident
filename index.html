<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trident | AV Array</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const CONFIG = {
    apiKey: "AIzaSyDcry0cEa5eqXiE_QgX2satkrt1mKsnFXQ",
    authDomain: "trident-56ae7.firebaseapp.com",
    projectId: "trident-56ae7",
    storageBucket: "trident-56ae7.firebasestorage.app",
    messagingSenderId: "788219973143",
    appId: "1:788219973143:web:299bfa34e72fa991c69652",
    measurementId: "G-NQMJBHWW9X"
};

class TridentApp {
    constructor() {
        this.app = initializeApp(CONFIG);
        this.auth = getAuth(this.app);
        this.db = getFirestore(this.app);
        this.provider = new GoogleAuthProvider();

        // Core State
        this.state = {
            user: null,
            rawUser: null,
            sessionID: Math.random().toString(36).substring(2, 15),
            currentRoom: null,
            lobbySSE: null,
            roomSSE: null,
            activeGroups: new Map(),
            processedPackets: new Set(),
            userCache: {},
            pfpBase64: "",
            inCall: false,
            localStream: null,
            peers: new Map()
        };

        this.rtcConfig = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };

        this.initAuth();
    }

    // --- AUTH ---
    initAuth() {
        onAuthStateChanged(this.auth, async (user) => {
            if (user) {
                this.state.rawUser = user;
                try {
                    const userDoc = await getDoc(doc(this.db, "users", user.uid)).catch(() => null);
                    if (userDoc && userDoc.exists()) {
                        this.state.user = userDoc.data();
                        this.launchUI();
                    } else {
                        this.showProfileSetup(true);
                    }
                } catch (error) {
                    this.showProfileSetup(true);
                }
            } else {
                document.getElementById('login-gate').style.display = 'flex';
            }
        });
    }

    async login() {
        try { await signInWithPopup(this.auth, this.provider); }
        catch (error) { alert("Auth Failed. Check pop-up blockers."); }
    }

    showProfileSetup(isFirst) {
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('app-main').style.display = 'none';
        document.getElementById('profile-gate').style.display = 'flex';

        if (!isFirst && this.state.user) {
            document.getElementById('setup-username').value = this.state.user.username;
            document.getElementById('setup-preview').src = this.state.user.pfp;
            this.state.pfpBase64 = this.state.user.pfp;
        } else if (isFirst && this.state.rawUser) {
            document.getElementById('setup-preview').src = this.state.rawUser.photoURL || "https://via.placeholder.com/120";
            this.state.pfpBase64 = this.state.rawUser.photoURL || "";
        }
    }

    async saveProfile() {
        const btn = document.getElementById('save-btn');
        const user = document.getElementById('setup-username').value.trim();
        const errorTxt = document.getElementById('profile-error');
        errorTxt.innerText = "";

        if (!user) return errorTxt.innerText = "Username required.";
        if (!this.state.pfpBase64) return errorTxt.innerText = "Image required.";

        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        const profileData = {
            username: user.toUpperCase(),
            pfp: this.state.pfpBase64,
            uid: this.state.rawUser.uid
        };

        try {
            await setDoc(doc(this.db, "users", this.state.rawUser.uid), profileData);
            this.state.user = profileData;
            document.getElementById('profile-gate').style.display = 'none';
            btn.innerText = "SAVE AND ENTER";
            btn.disabled = false;
            this.launchUI();
        } catch (error) {
            errorTxt.innerText = "Database Error. Check Firestore Rules.";
            btn.innerText = "SAVE AND ENTER";
            btn.disabled = false;
        }
    }

    // --- SIGNALING ---
    async send(text) {
        if (!this.state.currentRoom) return;
        const meta = `${this.state.sessionID}<|>${this.state.user.username}<|>${text}<|>${this.state.rawUser.uid}`;
        fetch(`https://ntfy.sh/${this.state.currentRoom}`, { method: 'POST', body: meta }).catch(e => console.log(e));
    }

    join(room) {
        if (this.state.roomSSE) this.state.roomSSE.close();
        if (this.state.inCall) this.leaveCall();

        this.state.currentRoom = room;
        this.state.processedPackets.clear();
        document.getElementById('chat-stream').innerHTML = `<div class="text-[9px] text-cyan-900 font-bold uppercase tracking-widest p-4 text-center">Sync: ${room}</div>`;
        this.state.roomSSE = new EventSource(`https://ntfy.sh/${room}/sse`);
        this.state.roomSSE.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (this.state.processedPackets.has(data.id)) return;
            this.state.processedPackets.add(data.id);
            const p = data.message.split('<|>');
            if (p.length >= 3) {
                const sid = p[0];
                const text = p[2];

                if (text.startsWith("RTC|")) {
                    if (sid !== this.state.sessionID) this.handleRTC(sid, text);
                    return;
                }

                this.renderMsg(data.id, sid, p[1], text, p[3]);
            }
        };
        document.getElementById('header-title').innerText = room;
        this.send("connected.");

        // Load last 50 messages from Firestore
        this.loadMessageHistory(room);
    }

    async loadMessageHistory(room) {
        const messagesRef = query(collection(this.db, "messages", room, "chat"), orderBy("timestamp", "desc"), limit(50));
        const querySnapshot = await getDocs(messagesRef);
        const chatBox = document.getElementById('chat-stream');
        chatBox.innerHTML = ''; // clear previous chat
        const messages = [];
        querySnapshot.forEach(doc => {
            messages.push(doc.data()); // load in array for reverse order
        });
        messages.reverse().forEach(msg => {
            this.renderMsg(msg.id, msg.sid, msg.user, msg.msg, msg.uid);
        });
    }

    // --- WEBRTC ---
    async toggleCall() {
        if (this.state.inCall) {
            this.leaveCall();
        } else {
            await this.startCall();
        }
    }

    async startCall() {
        try {
            this.state.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            this.state.inCall = true;
            document.getElementById('video-array').classList.remove('hidden');
            document.getElementById('btn-call').innerText = '🔴 LEAVE';
            document.getElementById('btn-call').classList.add('bg-red-600', 'hover:bg-red-500');
            document.getElementById('btn-call').classList.remove('bg-cyan-600', 'hover:bg-cyan-500');
            document.getElementById('av-controls').classList.remove('hidden');

            this.clearVideos();
            this.addVideoNode(this.state.sessionID, this.state.localStream, true);
            this.send("RTC|JOIN|");
        } catch (e) {
            alert("Hardware Access Denied. Cannot initialize AV Array.");
        }
    }

    leaveCall() {
        this.state.inCall = false;
        if (this.state.localStream) {
            this.state.localStream.getTracks().forEach(t => t.stop());
        }
        for (let [peerId, pc] of this.state.peers.entries()) {
            pc.close();
        }
        this.state.peers.clear();
        this.clearVideos();
        document.getElementById('video-array').classList.add('hidden');
        document.getElementById('btn-call').innerText = '📞 CALL';
        document.getElementById('btn-call').classList.remove('bg-red-600', 'hover:bg-red-500');
        document.getElementById('btn-call').classList.add('bg-cyan-600', 'hover:bg-cyan-500');
        document.getElementById('av-controls').classList.add('hidden');
        this.send("RTC|LEAVE|");
    }

    async handleRTC(peerId, rtcString) {
        const parts = rtcString.split('|');
        const type = parts[1];
        const target = parts[2];
        const payload = parts.slice(3).join('|');

        if (target && target !== this.state.sessionID) return;

        if (type === "JOIN") {
            if (!this.state.inCall) return;
            const pc = this.createPeer(peerId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            this.send(`RTC|OFFER|${peerId}|${JSON.stringify(offer)}`);
        }
        else if (type === "OFFER") {
            if (!this.state.inCall) return;
            const pc = this.createPeer(peerId);
            await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(payload)));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            this.send(`RTC|ANSWER|${peerId}|${JSON.stringify(answer)}`);
        }
        else if (type === "ANSWER") {
            const pc = this.state.peers.get(peerId);
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(payload)));
        }
        else if (type === "ICE") {
            const pc = this.state.peers.get(peerId);
            if (pc) await pc.addIceCandidate(new RTCIceCandidate(JSON.parse(payload)));
        }
        else if (type === "LEAVE") {
            const pc = this.state.peers.get(peerId);
            if (pc) {
                pc.close();
                this.state.peers.delete(peerId);
            }
            // Remove video node
            const wrapper = document.getElementById(`wrapper-${peerId}`);
            if (wrapper) wrapper.remove();
        }
    }

    createPeer(peerId) {
        const pc = new RTCPeerConnection(this.rtcConfig);
        this.state.peers.set(peerId, pc);

        this.state.localStream.getTracks().forEach(track => pc.addTrack(track, this.state.localStream));

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                this.send(`RTC|ICE|${peerId}|${JSON.stringify(e.candidate)}`);
            }
        };

        pc.ontrack = (e) => {
            this.addVideoNode(peerId, e.streams[0], false);
        };

        return pc;
    }

    addVideoNode(id, stream, isMuted) {
        if (document.getElementById(`vid-${id}`)) return;
        const wrapper = document.createElement('div');
        wrapper.id = `wrapper-${id}`;
        wrapper.className = "relative aspect-video bg-black rounded-2xl overflow-hidden border border-white/10 shadow-2xl";

        const vid = document.createElement('video');
        vid.id = `vid-${id}`;
        vid.autoplay = true;
        vid.playsInline = true;
        vid.className = "w-full h-full object-cover";
        if (isMuted) vid.muted = true;

        vid.srcObject = stream;
        wrapper.appendChild(vid);
        document.getElementById('video-grid').appendChild(wrapper);
    }

    clearVideos() {
        document.getElementById('video-grid').innerHTML = '';
    }

    toggleHardware(type) {
        if (!this.state.localStream) return;
        if (type === 'audio') {
            const track = this.state.localStream.getAudioTracks()[0];
            if (track) {
                track.enabled = !track.enabled;
                document.getElementById('btn-mic-toggle').innerText = track.enabled ? '🎤 ON' : '🎤 OFF';
                document.getElementById('btn-mic-toggle').classList.toggle('bg-red-900', !track.enabled);
            }
        } else if (type === 'video') {
            const track = this.state.localStream.getVideoTracks()[0];
            if (track) {
                track.enabled = !track.enabled;
                document.getElementById('btn-cam-toggle').innerText = track.enabled ? '📷 ON' : '📷 OFF';
                document.getElementById('btn-cam-toggle').classList.toggle('bg-red-900', !track.enabled);
            }
        }
    }

    // --- Lobby ---
    initLobby() {
        if (this.state.lobbySSE) this.state.lobbySSE.close();
        this.state.lobbySSE = new EventSource(`https://ntfy.sh/TRIDENT_LOBBY_V5/sse`);
        this.state.lobbySSE.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const p = data.message.split('|');
            if (p[0] === "HB") {
                this.state.activeGroups.set(p[1], { id: p[1], user: p[2], ts: Date.now() });
                this.renderList();
            }
        };
        setInterval(() => {
            if (this.state.currentRoom) {
                fetch(`https://ntfy.sh/TRIDENT_LOBBY_V5`, {
                    method: 'POST', body: `HB|${this.state.currentRoom}|${this.state.user.username}`
                });
            }
            this.cleanup();
        }, 8000);
    }

    // --- UI ---
    renderMsg(msgId, sid, user, msg, uid) {
        const isSelf = sid === this.state.sessionID;
        const box = document.getElementById('chat-stream');
        const div = document.createElement('div');
        div.className = `flex mb-5 animate__animated animate__fadeInUp animate__faster ${isSelf ? 'justify-end' : 'justify-start'}`;

        let initialPfp = isSelf ? this.state.user.pfp : "https://via.placeholder.com/120";

        div.innerHTML = `
            <div class="flex ${isSelf ? 'flex-row-reverse' : 'flex-row'} items-start">
                <img id="pfp-${msgId}" src="${initialPfp}" class="w-8 h-8 rounded-full border border-white/10 object-cover shadow-lg ${isSelf ? 'ml-3' : 'mr-3'} bg-[#111]">
                <div class="flex flex-col ${isSelf ? 'items-end' : 'items-start'}">
                    <span class="text-[9px] font-bold mb-1 ${isSelf ? 'text-cyan-500' : 'text-gray-600'} uppercase">${isSelf ? 'YOU' : user}</span>
                    <div class="max-w-md p-3 rounded-xl text-sm ${isSelf ? 'bg-cyan-600/10 border border-cyan-500/20 text-white' : 'bg-white/5 border border-white/5 text-gray-300'}">
                        ${msg}
                    </div>
                </div>
            </div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;

        if (!isSelf && uid) {
            if (this.state.userCache[uid]) {
                document.getElementById(`pfp-${msgId}`).src = this.state.userCache[uid];
            } else {
                getDoc(doc(this.db, "users", uid)).then(docSnap => {
                    if (docSnap.exists()) {
                        const loadedPfp = docSnap.data().pfp;
                        this.state.userCache[uid] = loadedPfp;
                        const imgEl = document.getElementById(`pfp-${msgId}`);
                        if (imgEl) imgEl.src = loadedPfp;
                    }
                }).catch(e => {});
            }
        }
    }

    renderList() {
        const list = document.getElementById('group-list');
        list.innerHTML = '';
        this.state.activeGroups.forEach(g => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 mb-2 rounded-xl bg-white/5 border border-white/5 hover:border-cyan-500/40 transition-all";
            btn.innerHTML = `<div class="text-xs font-bold text-white">${g.user}'s Group</div><div class="text-[8px] text-gray-600 font-mono uppercase">${g.id}</div>`;
            btn.onclick = () => this.join(g.id);
            list.appendChild(btn);
        });
    }

    cleanup() {
        const now = Date.now();
        this.state.activeGroups.forEach((v, k) => { if (now - v.ts > 25000) this.state.activeGroups.delete(k); });
        this.renderList();
    }

    launchUI() {
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('profile-gate').style.display = 'none';
        document.getElementById('app-main').style.display = 'flex';
        document.getElementById('u-name').innerText = this.state.user.username;
        document.getElementById('u-img').src = this.state.user.pfp;
        this.initLobby();
    }

    // --- Send Chat Message ---
    async pushMsg() {
        const i = document.getElementById('msg-in');
        if (!i.value) return;
        await this.send(i.value);
        i.value = '';
    }

    async send(text) {
        if (!this.state.currentRoom) return;
        const msgId = Math.random().toString(36).substring(2, 15);
        const messageData = {
            id: msgId,
            sid: this.state.sessionID,
            user: this.state.user.username,
            msg: text,
            uid: this.state.rawUser.uid,
            timestamp: Date.now()
        };
        // Save message to Firestore
        await setDoc(doc(this.db, "messages", this.state.currentRoom, "chat", msgId), messageData);
        // Send via SSE
        const meta = `${this.state.sessionID}<|>${this.state.user.username}<|>${text}<|>${this.state.rawUser.uid}`;
        fetch(`https://ntfy.sh/${this.state.currentRoom}`, { method: 'POST', body: meta }).catch(e => console.log(e));
    }
}

window.Trident = new TridentApp();
window.doLogin = () => window.Trident.login();
window.saveProfile = () => window.Trident.saveProfile();
window.editProfile = () => window.Trident.showProfileSetup(false);
window.createGroup = () => window.Trident.join("T_" + Math.random().toString(36).substring(2, 8).toUpperCase());
window.pushMsg = () => window.Trident.pushMsg();
window.toggleAV = () => window.Trident.toggleCall();
window.toggleHardware = (t) => window.Trident.toggleHardware(t);
window.processFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 128;
            let w = img.width; let h = img.height;
            if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
            else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const compressed = canvas.toDataURL('image/jpeg', 0.6);
            window.Trident.state.pfpBase64 = compressed;
            document.getElementById('setup-preview').src = compressed;
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
};
document.addEventListener('keydown', (e) => { if(e.key === 'Enter') window.pushMsg(); });
</script>
