<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trident | WSS Array</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="module">
        // =========================================================================================
        // TRIDENT ALPHA ENGINE v26.3.28j (UNABRIDGED WEBSOCKET EDITION)
        // Fix 1: Switched to WSS (WebSockets) to bypass Chrome SSE connection limits/firewalls
        // Fix 2: Dynamic Project-Isolated Lobbies to prevent Ntfy.sh Anti-Spam Bans
        // Fix 3: Patched setInterval memory leaks causing heartbeat flooding
        // =========================================================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const CONFIG = {
            apiKey: "AIzaSyDcry0cEa5eqXiE_QgX2satkrt1mKsnFXQ",
            authDomain: "trident-56ae7.firebaseapp.com",
            projectId: "trident-56ae7",
            storageBucket: "trident-56ae7.firebasestorage.app",
            messagingSenderId: "788219973143",
            appId: "1:788219973143:web:299bfa34e72fa991c69652",
            measurementId: "G-NQMJBHWW9X"
        };

        class TridentApp {
            constructor() {
                this.app = initializeApp(CONFIG);
                this.auth = getAuth(this.app);
                this.db = getFirestore(this.app);
                this.provider = new GoogleAuthProvider();
                
                // Dynamic Private Lobby based on your Firebase Project ID
                this.LOBBY_TOPIC = "TRIDENT_NET_" + CONFIG.projectId.replace(/[^a-zA-Z0-9]/g, '').substring(0,8).toUpperCase();
                
                this.state = {
                    user: null, 
                    rawUser: null,
                    sessionID: Math.random().toString(36).substring(2, 15),
                    currentRoom: null,
                    lobbyWS: null, // Upgraded to WebSocket
                    roomWS: null,  // Upgraded to WebSocket
                    activeGroups: new Map(),
                    processedPackets: new Set(),
                    userCache: {},
                    pfpBase64: "",
                    
                    roomUsers: new Map(), 
                    inCall: false,
                    localStream: null,
                    peers: new Map() 
                };
                
                this.rtcConfig = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                };

                // Timers
                this.lobbyInterval = null;
                this.rosterInterval = null;

                this.initAuth();
            }

            // --- AUTHENTICATION ---
            initAuth() {
                onAuthStateChanged(this.auth, async (user) => {
                    if (user) {
                        this.state.rawUser = user;
                        try {
                            const userDoc = await getDoc(doc(this.db, "users", user.uid)).catch(() => null);
                            if (userDoc && userDoc.exists()) {
                                this.state.user = userDoc.data();
                                this.state.userCache[this.state.rawUser.uid] = this.state.user.pfp;
                                this.launchUI();
                            } else {
                                this.showProfileSetup(true);
                            }
                        } catch (error) {
                            this.showProfileSetup(true);
                        }
                    } else {
                        document.getElementById('login-gate').style.display = 'flex';
                    }
                });
            }

            async login() {
                try { await signInWithPopup(this.auth, this.provider); } 
                catch (error) { alert("Auth Failed. Check pop-up blockers."); }
            }

            showProfileSetup(isFirst) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('app-main').style.display = 'none';
                document.getElementById('profile-gate').style.display = 'flex';
                
                if (!isFirst && this.state.user) {
                    document.getElementById('setup-username').value = this.state.user.username;
                    document.getElementById('setup-preview').src = this.state.user.pfp;
                    this.state.pfpBase64 = this.state.user.pfp;
                } else if (isFirst && this.state.rawUser) {
                    document.getElementById('setup-preview').src = this.state.rawUser.photoURL || "https://via.placeholder.com/120";
                    this.state.pfpBase64 = this.state.rawUser.photoURL || "";
                }
            }

            async saveProfile() {
                const btn = document.getElementById('save-btn');
                const user = document.getElementById('setup-username').value.trim();
                const errorTxt = document.getElementById('profile-error');
                errorTxt.innerText = ""; 

                if (!user) return errorTxt.innerText = "Username required.";
                if (!this.state.pfpBase64) return errorTxt.innerText = "Image required.";
                
                btn.innerText = "UPLOADING...";
                btn.disabled = true;

                const profileData = {
                    username: user.toUpperCase(),
                    pfp: this.state.pfpBase64,
                    uid: this.state.rawUser.uid
                };

                try {
                    await setDoc(doc(this.db, "users", this.state.rawUser.uid), profileData);
                    this.state.user = profileData;
                    this.state.userCache[this.state.rawUser.uid] = profileData.pfp;
                    document.getElementById('profile-gate').style.display = 'none';
                    btn.innerText = "SAVE AND ENTER";
                    btn.disabled = false;
                    this.launchUI();
                } catch (error) {
                    errorTxt.innerText = "Database Error. Check Firestore Rules.";
                    btn.innerText = "SAVE AND ENTER";
                    btn.disabled = false;
                }
            }

            // --- HIGH-SPEED WEBSOCKET LAYER ---
            async send(text) {
                if (!this.state.currentRoom) return;
                const meta = `${this.state.sessionID}<|>${this.state.user.username}<|>${text}<|>${this.state.rawUser.uid}`;
                
                try {
                    const res = await fetch(`https://ntfy.sh/${this.state.currentRoom}`, { method: 'POST', body: meta });
                    if (!res.ok) console.warn("Transmission Warning:", res.status);
                } catch (e) { console.error("Transmission Error:", e); }
            }

            async join(room) {
                if (this.state.roomWS) this.state.roomWS.close();
                if (this.state.inCall) this.leaveCall();

                this.state.currentRoom = room;
                this.state.processedPackets.clear();
                this.state.roomUsers.clear();
                
                document.getElementById('chat-stream').innerHTML = '';
                document.getElementById('header-title').innerText = room;
                document.getElementById('room-users-list').innerHTML = '';
                document.getElementById('status-text').innerText = "WSS CONNECTING...";
                document.getElementById('status-text').className = "text-[9px] font-black text-yellow-600 tracking-widest uppercase px-4 py-2 border border-white/5 rounded-full";

                // 1. CONNECT WEBSOCKET (Massive stability upgrade over SSE)
                this.state.roomWS = new WebSocket(`wss://ntfy.sh/${room}/ws`);
                
                this.state.roomWS.onopen = () => {
                    document.getElementById('status-text').innerText = "WSS SECURED";
                    document.getElementById('status-text').className = "text-[9px] font-black text-green-500 tracking-widest uppercase px-4 py-2 border border-green-500/20 rounded-full bg-green-500/10";
                    this.send("SYS_JOIN");
                };

                this.state.roomWS.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        if (data.event === "message" && data.message) {
                            if (this.state.processedPackets.has(data.id)) return;
                            this.state.processedPackets.add(data.id);
                            this.processIncomingData(data, false); 
                        }
                    } catch (err) {}
                };

                // 2. FETCH HISTORY
                fetch(`https://ntfy.sh/${room}/json?poll=1&limit=50`).then(async res => {
                    if (res.ok) {
                        const historyText = await res.text();
                        const lines = historyText.trim().split('\n').reverse(); 
                        for (const line of lines) {
                            if (!line) continue;
                            try {
                                const data = JSON.parse(line);
                                if (data.event === "message" && data.message && !this.state.processedPackets.has(data.id)) {
                                    this.state.processedPackets.add(data.id);
                                    this.processIncomingData(data, true); 
                                }
                            } catch (err) {}
                        }
                    }
                    const divider = document.createElement('div');
                    divider.className = "text-[9px] text-cyan-900 font-bold uppercase tracking-widest p-4 text-center border-b border-cyan-900/30 mb-6 mt-4";
                    divider.innerText = `WebSocket Pipeline Active: ${room}`;
                    document.getElementById('chat-stream').appendChild(divider);
                }).catch(e => console.log("History fetch ignored."));
                
                // Roster Heartbeat
                if (this.rosterInterval) clearInterval(this.rosterInterval);
                this.rosterInterval = setInterval(() => {
                    if (this.state.currentRoom) this.send("SYS_PING");
                    this.cleanupRoster();
                }, 15000);
            }

            processIncomingData(data, isHistory) {
                if (!data || !data.message) return;
                const p = data.message.split('<|>');
                if (p.length < 3) return; 

                const sid = p[0];
                const username = p[1];
                const text = p[2];
                const uid = p.length > 3 ? p[3] : null;

                if (uid) {
                    this.state.roomUsers.set(sid, { name: username, uid: uid, ts: Date.now() });
                    if (!isHistory) this.renderRoster(); 
                }

                if (text.startsWith("RTC|")) {
                    if (sid !== this.state.sessionID && !isHistory) this.handleRTC(sid, text);
                    return; 
                }
                
                if (text === "SYS_JOIN" || text === "SYS_PING") return;

                this.renderMsg(data.id, sid, username, text, uid, isHistory);
            }

            // --- USER ROSTER ---
            renderRoster() {
                const list = document.getElementById('room-users-list');
                list.innerHTML = '';
                
                list.innerHTML += `
                    <div class="flex items-center space-x-3 p-2 bg-white/5 rounded-xl border border-cyan-500/20 shadow-md">
                        <div class="relative">
                            <img src="${this.state.user.pfp}" class="w-6 h-6 rounded-full object-cover bg-black">
                            <div class="absolute bottom-0 right-0 w-2 h-2 bg-green-500 rounded-full border border-black shadow-[0_0_5px_#22c55e]"></div>
                        </div>
                        <span class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">YOU</span>
                    </div>`;

                this.state.roomUsers.forEach((v, k) => {
                    if (k === this.state.sessionID) return;
                    let pfp = this.state.userCache[v.uid] || "https://via.placeholder.com/120";
                    
                    list.innerHTML += `
                        <div class="flex items-center space-x-3 p-2 hover:bg-white/5 rounded-xl transition-all">
                            <div class="relative">
                                <img id="roster-pfp-${v.uid}" src="${pfp}" class="w-6 h-6 rounded-full object-cover opacity-80 bg-black">
                                <div class="absolute bottom-0 right-0 w-2 h-2 bg-green-500 rounded-full border border-black"></div>
                            </div>
                            <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest truncate">${v.name}</span>
                        </div>`;
                        
                    if (!this.state.userCache[v.uid]) {
                        getDoc(doc(this.db, "users", v.uid)).then(docSnap => {
                            if (docSnap.exists()) {
                                const loadedPfp = docSnap.data().pfp;
                                this.state.userCache[v.uid] = loadedPfp;
                                const elements = document.querySelectorAll(`#roster-pfp-${v.uid}`);
                                elements.forEach(el => el.src = loadedPfp);
                            }
                        }).catch(e => {});
                    }
                });
                document.getElementById('roster-count').innerText = `${this.state.roomUsers.size} ONLINE`;
            }

            cleanupRoster() {
                const now = Date.now();
                let changed = false;
                this.state.roomUsers.forEach((v, k) => {
                    if (now - v.ts > 35000 && k !== this.state.sessionID) {
                        this.state.roomUsers.delete(k);
                        changed = true;
                    }
                });
                if (changed) this.renderRoster();
            }

            // --- WEBRTC MESH AV PIPELINE ---
            async toggleCall() {
                if (this.state.inCall) {
                    this.leaveCall();
                } else {
                    await this.startCall();
                }
            }

            async startCall() {
                try {
                    this.state.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    this.state.inCall = true;
                    
                    document.getElementById('video-array').classList.remove('hidden');
                    document.getElementById('btn-call').innerText = '🔴 LEAVE';
                    document.getElementById('btn-call').classList.add('bg-red-600', 'hover:bg-red-500');
                    document.getElementById('btn-call').classList.remove('bg-cyan-600', 'hover:bg-cyan-500');
                    document.getElementById('av-controls').classList.remove('hidden');
                    
                    this.addVideoNode(this.state.sessionID, this.state.localStream, true, "YOU");
                    this.send("RTC|JOIN|");
                } catch (e) {
                    alert("Camera/Microphone Access Denied.");
                }
            }

            leaveCall() {
                this.state.inCall = false;
                if (this.state.localStream) this.state.localStream.getTracks().forEach(t => t.stop());
                for (let [peerId, pc] of this.state.peers.entries()) { pc.close(); }
                this.state.peers.clear();
                
                document.getElementById('video-array').innerHTML = '';
                document.getElementById('video-array').classList.add('hidden');
                document.getElementById('btn-call').innerText = '📞 CALL';
                document.getElementById('btn-call').classList.remove('bg-red-600', 'hover:bg-red-500');
                document.getElementById('btn-call').classList.add('bg-cyan-600', 'hover:bg-cyan-500');
                document.getElementById('av-controls').classList.add('hidden');
                
                this.send("RTC|LEAVE|");
            }

            async handleRTC(peerId, rtcString) {
                const parts = rtcString.split('|');
                const type = parts[1];
                const target = parts[2];
                const payload = parts.slice(3).join('|');

                if (target && target !== this.state.sessionID) return;

                if (type === "JOIN") {
                    if (!this.state.inCall) return;
                    const pc = this.createPeer(peerId);
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    this.send(`RTC|OFFER|${peerId}|${JSON.stringify(offer)}`);
                } 
                else if (type === "OFFER") {
                    if (!this.state.inCall) return;
                    const pc = this.createPeer(peerId);
                    await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(payload)));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    this.send(`RTC|ANSWER|${peerId}|${JSON.stringify(answer)}`);
                } 
                else if (type === "ANSWER") {
                    const pc = this.state.peers.get(peerId);
                    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(payload)));
                } 
                else if (type === "ICE") {
                    const pc = this.state.peers.get(peerId);
                    if (pc) await pc.addIceCandidate(new RTCIceCandidate(JSON.parse(payload)));
                } 
                else if (type === "LEAVE") {
                    const pc = this.state.peers.get(peerId);
                    if (pc) { pc.close(); this.state.peers.delete(peerId); }
                    const vidWrapper = document.getElementById(`wrapper-${peerId}`);
                    if (vidWrapper) vidWrapper.remove();
                }
            }

            createPeer(peerId) {
                const pc = new RTCPeerConnection(this.rtcConfig);
                this.state.peers.set(peerId, pc);

                this.state.localStream.getTracks().forEach(track => pc.addTrack(track, this.state.localStream));

                pc.onicecandidate = (e) => {
                    if (e.candidate) this.send(`RTC|ICE|${peerId}|${JSON.stringify(e.candidate)}`);
                };

                pc.ontrack = (e) => {
                    let peerName = "OPERATOR";
                    if (this.state.roomUsers.has(peerId)) peerName = this.state.roomUsers.get(peerId).name;
                    this.addVideoNode(peerId, e.streams[0], false, peerName);
                };

                return pc;
            }

            addVideoNode(id, stream, isMuted, nameLabel) {
                if (document.getElementById(`vid-${id}`)) return;

                const wrapper = document.createElement('div');
                wrapper.id = `wrapper-${id}`;
                wrapper.className = "relative aspect-video bg-[#0a0a0a] rounded-2xl overflow-hidden border border-white/10 shadow-2xl flex-1 min-w-[200px] max-w-[300px]";
                
                const vid = document.createElement('video');
                vid.id = `vid-${id}`;
                vid.autoplay = true;
                vid.playsInline = true;
                vid.className = "w-full h-full object-cover";
                if (isMuted) vid.muted = true;
                
                vid.srcObject = stream;
                
                const label = document.createElement('div');
                label.className = "absolute bottom-2 left-2 bg-black/70 px-3 py-1 rounded-lg text-[9px] font-bold text-white uppercase tracking-widest backdrop-blur-md border border-white/5";
                label.innerText = nameLabel;

                wrapper.appendChild(vid);
                wrapper.appendChild(label);
                document.getElementById('video-array').appendChild(wrapper);
            }

            toggleHardware(type) {
                if (!this.state.localStream) return;
                if (type === 'audio') {
                    const track = this.state.localStream.getAudioTracks()[0];
                    if (track) {
                        track.enabled = !track.enabled;
                        const btn = document.getElementById('btn-mic-toggle');
                        btn.innerText = track.enabled ? '🎤 ON' : '🎤 MUTED';
                        btn.classList.toggle('bg-red-900', !track.enabled);
                        btn.classList.toggle('border-red-500/50', !track.enabled);
                    }
                } else if (type === 'video') {
                    const track = this.state.localStream.getVideoTracks()[0];
                    if (track) {
                        track.enabled = !track.enabled;
                        const btn = document.getElementById('btn-cam-toggle');
                        btn.innerText = track.enabled ? '📷 ON' : '📷 OFF';
                        btn.classList.toggle('bg-red-900', !track.enabled);
                        btn.classList.toggle('border-red-500/50', !track.enabled);
                    }
                }
            }

            // --- LOBBY WEBSOCKET ---
            initLobby() {
                if (this.state.lobbyWS) this.state.lobbyWS.close();
                
                this.state.lobbyWS = new WebSocket(`wss://ntfy.sh/${this.LOBBY_TOPIC}/ws`);
                this.state.lobbyWS.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        if (data.event === "message" && data.message) {
                            const p = data.message.split('|');
                            if (p[0] === "HB") {
                                this.state.activeGroups.set(p[1], { id: p[1], user: p[2], ts: Date.now() });
                                this.renderList();
                            }
                        }
                    } catch (err) {}
                };

                if (this.lobbyInterval) clearInterval(this.lobbyInterval);
                this.lobbyInterval = setInterval(() => {
                    if (this.state.currentRoom) {
                        fetch(`https://ntfy.sh/${this.LOBBY_TOPIC}`, { method: 'POST', body: `HB|${this.state.currentRoom}|${this.state.user.username}` }).catch(e=>{});
                    }
                    this.cleanupGroups();
                }, 8000);
            }

            renderList() {
                const list = document.getElementById('group-list');
                list.innerHTML = '';
                this.state.activeGroups.forEach(g => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 mb-3 rounded-2xl bg-white/[0.02] border border-white/5 hover:border-cyan-500/40 hover:bg-white/[0.04] transition-all group shadow-sm";
                    btn.innerHTML = `<div class="text-xs font-black text-white uppercase tracking-tighter group-hover:text-cyan-400 transition-colors">${g.user}'S GROUP</div><div class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mt-1">ID: ${g.id}</div>`;
                    btn.onclick = () => this.join(g.id);
                    list.appendChild(btn);
                });
            }

            cleanupGroups() {
                const now = Date.now();
                let changed = false;
                this.state.activeGroups.forEach((v, k) => { 
                    if (now - v.ts > 30000) { this.state.activeGroups.delete(k); changed = true; } 
                });
                if (changed) this.renderList();
            }

            // --- MESSAGE UI RENDERING ---
            renderMsg(msgId, sid, user, msg, uid, isHistory) {
                const isSelf = sid === this.state.sessionID;
                const box = document.getElementById('chat-stream');
                const div = document.createElement('div');
                div.className = `flex mb-6 ${!isHistory ? 'animate__animated animate__fadeInUp animate__faster' : ''} ${isSelf ? 'justify-end' : 'justify-start'}`;
                
                let initialPfp = isSelf ? this.state.user.pfp : "https://via.placeholder.com/120";

                div.innerHTML = `
                    <div class="flex ${isSelf ? 'flex-row-reverse' : 'flex-row'} items-start max-w-[85%]">
                        <img id="pfp-${msgId}" src="${initialPfp}" class="w-8 h-8 rounded-full border border-white/10 object-cover shadow-lg ${isSelf ? 'ml-3' : 'mr-3'} bg-[#111]">
                        <div class="flex flex-col ${isSelf ? 'items-end' : 'items-start'}">
                            <span class="text-[9px] font-black mb-1 ${isSelf ? 'text-cyan-500' : 'text-gray-500'} uppercase tracking-widest">${isSelf ? 'YOU' : user}</span>
                            <div class="p-4 rounded-2xl text-[13px] leading-relaxed ${isSelf ? 'bg-cyan-600/10 border border-cyan-500/20 text-white rounded-tr-sm' : 'bg-white/[0.03] border border-white/5 text-gray-300 rounded-tl-sm'} break-words whitespace-pre-wrap w-full shadow-sm">
                                ${msg}
                            </div>
                        </div>
                    </div>`;
                
                if (isHistory && box.firstChild) {
                    box.insertBefore(div, box.firstChild);
                } else {
                    box.appendChild(div);
                    box.scrollTop = box.scrollHeight;
                }

                if (!isSelf && uid) {
                    if (this.state.userCache[uid]) {
                        document.getElementById(`pfp-${msgId}`).src = this.state.userCache[uid];
                    } else {
                        getDoc(doc(this.db, "users", uid)).then(docSnap => {
                            if (docSnap.exists()) {
                                const loadedPfp = docSnap.data().pfp;
                                this.state.userCache[uid] = loadedPfp;
                                const elements = document.querySelectorAll(`#pfp-${msgId}`);
                                elements.forEach(el => el.src = loadedPfp);
                            }
                        }).catch(e => {});
                    }
                }
            }

            launchUI() {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('profile-gate').style.display = 'none';
                document.getElementById('app-main').style.display = 'flex';
                document.getElementById('u-name').innerText = this.state.user.username;
                document.getElementById('u-img').src = this.state.user.pfp;
                this.initLobby();
            }
        }

        // --- BINDINGS ---
        window.Trident = new TridentApp();
        window.doLogin = () => window.Trident.login();
        window.saveProfile = () => window.Trident.saveProfile();
        window.editProfile = () => window.Trident.showProfileSetup(false);
        window.createGroup = () => window.Trident.join("TR_" + Math.random().toString(36).substring(2, 9).toUpperCase());
        window.pushMsg = () => {
            const i = document.getElementById('msg-in');
            if (!i.value) return;
            window.Trident.send(i.value);
            i.value = '';
        };
        window.toggleAV = () => window.Trident.toggleCall();
        window.toggleHardware = (t) => window.Trident.toggleHardware(t);

        window.processFile = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 128;
                    let w = img.width; let h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
                    else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    window.Trident.state.pfpBase64 = compressed;
                    document.getElementById('setup-preview').src = compressed;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        document.addEventListener('keydown', (e) => { if(e.key === 'Enter') window.pushMsg(); });
    </script>

    <style>
        body { background-color: #030303; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(8, 8, 8, 0.85); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.03); }
        .stream-box::-webkit-scrollbar { width: 3px; }
        .stream-box::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .vid-grid { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- LOGIN GATE -->
    <div id="login-gate" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#030303]" style="display:none">
        <div class="w-full max-w-xs p-12 glass rounded-[3rem] text-center border border-white/5 shadow-2xl">
            <svg class="w-16 h-16 text-cyan-500 mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <h1 class="text-5xl font-black italic tracking-tighter mb-2">TRIDENT</h1>
            <p class="text-[9px] text-gray-600 font-bold uppercase tracking-[0.4em] mb-12">Alpha 26.3.28j</p>
            <button onclick="doLogin()" class="w-full bg-white text-black font-black py-4 rounded-2xl transition-all hover:bg-gray-200 text-[10px] uppercase tracking-widest shadow-xl active:scale-95">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- PROFILE SETUP GATE -->
    <div id="profile-gate" class="fixed inset-0 z-[110] hidden items-center justify-center bg-[#030303]">
        <div class="w-full max-w-sm p-10 glass rounded-[2.5rem] border border-white/5 shadow-2xl">
            <h2 class="text-2xl font-black italic tracking-tighter mb-8 text-center text-white">Operator Profile</h2>
            <div class="flex flex-col items-center mb-8">
                <div class="relative group cursor-pointer" onclick="document.getElementById('file-in').click()">
                    <img id="setup-preview" class="w-28 h-28 rounded-full border-[3px] border-cyan-500/50 object-cover bg-black shadow-[0_0_15px_rgba(6,182,212,0.2)] transition-all group-hover:border-cyan-400" src="https://via.placeholder.com/120">
                    <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-[9px] font-bold uppercase tracking-widest text-white">Upload</span>
                    </div>
                </div>
                <input type="file" id="file-in" onchange="processFile(event)" class="hidden" accept="image/*">
            </div>
            <div class="space-y-2 mb-6">
                <label class="text-[8px] font-bold text-gray-500 uppercase tracking-widest ml-4">Callsign</label>
                <input type="text" id="setup-username" class="w-full bg-black/50 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-500/50 transition-all text-sm text-center font-bold tracking-widest text-white shadow-inner" placeholder="Enter Callsign...">
            </div>
            <p id="profile-error" class="text-red-500 text-[10px] font-bold text-center h-6 mb-2"></p>
            <button id="save-btn" onclick="saveProfile()" class="w-full bg-cyan-600 text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-[0.2em] shadow-xl hover:bg-cyan-500 transition-all active:scale-95">Save & Initialize</button>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="app-main" class="flex flex-1 h-full" style="display:none">
        
        <!-- SIDEBAR -->
        <aside class="w-[320px] glass border-r border-white/5 flex flex-col z-20">
            <div class="p-8 flex-1 flex flex-col overflow-hidden">
                <button onclick="editProfile()" class="flex items-center space-x-4 mb-10 p-4 bg-white/[0.02] border border-white/5 rounded-2xl w-full hover:bg-white/[0.05] transition-all text-left group">
                    <img id="u-img" class="w-10 h-10 rounded-full border border-cyan-500/30 object-cover shadow-lg" src="" alt="">
                    <div class="flex flex-col overflow-hidden">
                        <span id="u-name" class="text-[11px] font-black truncate uppercase tracking-widest text-white group-hover:text-cyan-400 transition-colors">---</span>
                        <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-1">Edit Profile</span>
                    </div>
                </button>
                
                <!-- Roster -->
                <div class="mb-8 flex-shrink-0 border-b border-white/5 pb-8">
                    <div class="flex justify-between items-end mb-4 ml-2">
                        <h2 class="text-[9px] font-black text-cyan-600 uppercase tracking-widest">Active Nodes</h2>
                        <span id="roster-count" class="text-[8px] font-bold text-gray-500 bg-white/5 px-2 py-1 rounded-md">0 ONLINE</span>
                    </div>
                    <div id="room-users-list" class="space-y-2 stream-box max-h-[25vh] overflow-y-auto pr-2">
                        <div class="text-[9px] text-gray-700 italic ml-2 font-bold uppercase tracking-widest">Array Disconnected</div>
                    </div>
                </div>

                <!-- Global Lobbies -->
                <h2 class="text-[9px] font-black text-gray-600 uppercase tracking-widest mb-4 ml-2 flex-shrink-0">Global Frequencies</h2>
                <div id="group-list" class="space-y-2 overflow-y-auto flex-1 stream-box pr-2"></div>
            </div>
            
            <div class="p-8 border-t border-white/5 bg-black/20">
                <button onclick="createGroup()" class="w-full py-5 bg-cyan-600/10 border border-cyan-500/20 text-cyan-400 font-black text-[10px] uppercase tracking-[0.2em] rounded-2xl hover:bg-cyan-600 hover:text-white transition-all shadow-lg">
                    Initialize Group
                </button>
                <div class="mt-6 text-center text-[8px] text-gray-700 font-bold uppercase tracking-widest">WSS Array • Alpha 26.3.28j</div>
            </div>
        </aside>

        <!-- MAIN VIEW -->
        <main class="flex-1 flex flex-col bg-[#010101] relative">
            <header class="p-6 border-b border-white/5 flex justify-between items-center bg-black/60 z-10 backdrop-blur-md">
                <h3 id="header-title" class="text-2xl font-black tracking-tighter text-gray-300 uppercase italic">Standby</h3>
                <div class="flex items-center space-x-5">
                    <div id="av-controls" class="hidden flex space-x-3">
                        <button id="btn-cam-toggle" onclick="toggleHardware('video')" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-[9px] font-black uppercase tracking-widest border border-white/5 transition-all">📷 ON</button>
                        <button id="btn-mic-toggle" onclick="toggleHardware('audio')" class="px-5 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-[9px] font-bold uppercase tracking-widest border border-white/5 transition-all">🎤 ON</button>
                    </div>
                    <div id="status-text" class="text-[9px] font-black text-gray-600 tracking-widest uppercase px-4 py-2 border border-white/5 rounded-full bg-white/[0.02]">OFFLINE</div>
                </div>
            </header>

            <div id="video-array" class="hidden p-6 bg-[#030303] border-b border-white/5 shadow-2xl z-0 vid-grid max-h-[45vh] overflow-y-auto stream-box"></div>

            <div id="chat-stream" class="flex-1 overflow-y-auto p-10 stream-box z-0"></div>

            <footer class="p-8 border-t border-white/5 glass z-10">
                <div class="max-w-5xl mx-auto flex items-center space-x-4">
                    <input type="text" id="msg-in" class="flex-1 bg-black/60 border border-white/5 rounded-2xl p-5 outline-none focus:border-cyan-500/30 transition-all text-sm text-white shadow-inner placeholder-gray-700" placeholder="Broadcast payload to array...">
                    
                    <button id="btn-call" onclick="toggleAV()" class="px-8 h-14 bg-cyan-600/20 border border-cyan-500/30 text-cyan-400 font-black text-[10px] uppercase tracking-widest rounded-2xl transition-all hover:bg-cyan-600 hover:text-white hover:border-transparent flex items-center space-x-2">
                        <span class="text-sm">📞</span> <span>Call</span>
                    </button>
                    
                    <button onclick="pushMsg()" class="px-10 h-14 bg-white/10 border border-white/5 text-white font-black text-[10px] uppercase tracking-widest rounded-2xl transition-all hover:bg-white/20 shadow-lg active:scale-95">Send</button>
                </div>
            </footer>
        </main>
    </div>
</body>
</html>
