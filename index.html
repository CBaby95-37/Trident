<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trident | Discord-Style UI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const CONFIG = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID",
    measurementId: "YOUR_MEASUREMENT_ID"
};

class TridentDiscord {
    constructor() {
        this.app = initializeApp(CONFIG);
        this.auth = getAuth(this.app);
        this.db = getFirestore(this.app);
        this.storage = getStorage(this.app);
        this.provider = new GoogleAuthProvider();

        this.state = {
            user: null,
            rawUser: null,
            sessionID: Math.random().toString(36).substring(2, 15),
            currentServer: null,
            currentChannel: null,
            typingUsers: new Set(),
            userCache: {},
            pfpBase64: "",
        };

        this.initAuth();
    }

    initAuth() {
        onAuthStateChanged(this.auth, async (user) => {
            if (user) {
                this.state.rawUser = user;
                const userDoc = await getDoc(doc(this.db, "users", user.uid)).catch(() => null);
                if (userDoc && userDoc.exists()) {
                    this.state.user = userDoc.data();
                    this.launchUI();
                } else {
                    this.showProfileSetup(true);
                }
            } else {
                document.getElementById('login-gate').style.display = 'flex';
            }
        });
    }

    async login() { try { await signInWithPopup(this.auth, this.provider); } catch(e){ alert('Auth failed'); } }

    showProfileSetup(isFirst) {
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('app-main').style.display = 'none';
        document.getElementById('profile-gate').style.display = 'flex';

        if (isFirst && this.state.rawUser) {
            document.getElementById('setup-preview').src = this.state.rawUser.photoURL || 'https://via.placeholder.com/120';
            this.state.pfpBase64 = this.state.rawUser.photoURL || '';
        }
    }

    async saveProfile() {
        const userName = document.getElementById('setup-username').value.trim();
        if (!userName) return;
        const profileData = { username: userName, pfp: this.state.pfpBase64, uid: this.state.rawUser.uid };
        await setDoc(doc(this.db, 'users', this.state.rawUser.uid), profileData);
        this.state.user = profileData;
        document.getElementById('profile-gate').style.display = 'none';
        this.launchUI();
    }

    launchUI() {
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('profile-gate').style.display = 'none';
        document.getElementById('app-main').style.display = 'flex';
        document.getElementById('u-name').innerText = this.state.user.username;
        document.getElementById('u-img').src = this.state.user.pfp;
        this.initServers();
    }

    async initServers() {
        const serversQuery = query(collection(this.db, 'servers'));
        onSnapshot(serversQuery, (snapshot) => {
            const list = document.getElementById('server-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const srv = doc.data();
                const btn = document.createElement('button');
                btn.className = 'w-full p-4 rounded hover:bg-white/5';
                btn.innerText = srv.name;
                btn.onclick = () => this.joinServer(doc.id);
                list.appendChild(btn);
            });
        });
    }

    async joinServer(serverId) {
        this.state.currentServer = serverId;
        const channelsQuery = query(collection(this.db, `servers/${serverId}/channels`));
        onSnapshot(channelsQuery, snapshot => {
            const chList = document.getElementById('channel-list');
            chList.innerHTML = '';
            snapshot.forEach(doc => {
                const ch = doc.data();
                const btn = document.createElement('button');
                btn.className = 'w-full p-3 text-left rounded hover:bg-white/5';
                btn.innerText = ch.name;
                btn.onclick = () => this.joinChannel(doc.id);
                chList.appendChild(btn);
            });
        });
    }

    async joinChannel(channelId) {
        this.state.currentChannel = channelId;
        const chatRef = collection(this.db, `servers/${this.state.currentServer}/channels/${channelId}/messages`);
        const chatQuery = query(chatRef, orderBy('timestamp'));
        onSnapshot(chatQuery, snapshot => {
            const chatBox = document.getElementById('chat-stream');
            chatBox.innerHTML = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const div = document.createElement('div');
                div.className = 'p-2 mb-2 rounded bg-white/5';
                div.innerHTML = `<strong>${msg.username}:</strong> ${msg.text}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        });
    }

    async pushMsg() {
        const input = document.getElementById('msg-in');
        if (!input.value) return;
        await addDoc(collection(this.db, `servers/${this.state.currentServer}/channels/${this.state.currentChannel}/messages`), {
            text: input.value,
            username: this.state.user.username,
            uid: this.state.user.uid,
            timestamp: serverTimestamp()
        });
        input.value = '';
    }

}

window.Trident = new TridentDiscord();
window.doLogin = () => window.Trident.login();
window.saveProfile = () => window.Trident.saveProfile();
window.pushMsg = () => window.Trident.pushMsg();
</script>

<style>
body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; }
.glass { background: rgba(8,8,8,0.85); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.05); }
.stream-box::-webkit-scrollbar { width: 3px; }
.stream-box::-webkit-scrollbar-thumb { background: #333; border-radius:3px; }
</style>

</head>
<body class="h-screen flex overflow-hidden">

<!-- LOGIN -->

<div id="login-gate" class="fixed inset-0 flex items-center justify-center" style="display:none">
    <button onclick="doLogin()" class="p-6 bg-cyan-600 rounded-xl">Login with Google</button>
</div>

<!-- PROFILE -->

<div id="profile-gate" class="fixed inset-0 hidden flex-col items-center justify-center">
    <input id="setup-username" placeholder="Username" />
    <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- MAIN APP -->

<div id="app-main" class="flex flex-1 hidden">
    <aside class="w-64 glass flex flex-col">
        <div class="p-4" id="user-panel">
            <img id="u-img" class="w-12 h-12 rounded-full" src="" />
            <span id="u-name">---</span>
        </div>
        <div id="server-list" class="flex-1 overflow-y-auto"></div>
        <div id="channel-list" class="flex-1 overflow-y-auto"></div>
    </aside>
    <main class="flex-1 flex flex-col">
        <div id="chat-stream" class="flex-1 overflow-y-auto p-4 stream-box"></div>
        <footer class="p-4 flex">
            <input id="msg-in" class="flex-1 p-2 rounded bg-black/50" placeholder="Type a message" />
            <button onclick="pushMsg()" class="ml-2 p-2 bg-cyan-600 rounded">Send</button>
        </footer>
    </main>
</div>

</body>
</html>
